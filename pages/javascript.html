<!DOCTYPE html>

<head>
    <meta charset="utf-8">

    <link rel="stylesheet" href="../design/styleJavascript.css" type="text/css">
</head>

<body>
    <header>
        <h1>Web programozás-1 Előadás Házi feladat</h1>
    </header>
    <nav id="nav">
        <ul>
            <li><a href="index.html">Főoldal</a></li>
            <li class="active"><a href="javascript.html">JavaScript</a></li>
            <li><a href="react.html">React</a></li>
            <li><a href="spa.html">SPA</a></li>
            <li><a href="fetchapi.html">Fetch API</a></li>
            <li><a href="axios.html">Axios</a></li>
            <li><a href="oojs.html">OOJS</a></li>
        </ul>
    </nav>
    <div id="wrapper">
        <div id="content">
            <h2>Tulajdonos adatok CRUD</h2>

            <div class="bemenet">
                <input type="text" id="nev" placeholder="Név">
                <input type="text" id="varos" placeholder="Város">
                <button class="hozzaadas" onclick="createUser()">Hozzáadás</button>
            </div>

            <ul id="lista"></ul>

            <script>
                // "adatbázis" (tömb)
                let users = [
                    { id: 1, nev: "Balatonjárók Zrt.", varos: "Siófok" },
                    { id: 2, nev: "3Hajózási Kft.", varos: "Tihany" },
                    { id: 3, nev: "Balatoni Hajózási Zrt.", varos: "Siófok" },
                    { id: 4, nev: "Egyéni vállalkozó", varos: "Siófok" },
                    { id: 5, nev: "Balatoni Sétahajózási Kft.", varos: "Keszthely" },
                    { id: 6, nev: "Vízirendőrség", varos: "Siófok" },
                    { id: 7, nev: "Zánkai GyIC Közhasznú Kft.", varos: "Zánka" }
                ];

                // READ
                function render() {
                    const lista = document.getElementById("lista");
                    lista.innerHTML = "";

                    users.forEach(user => {
                        lista.innerHTML += `
                            
            <li>
                <span>${user.nev}</span>
                <span>${user.varos}</span>
                <span>
                    <button class="modositas" onclick="updateUser(${user.id})">Módosítás</button>
                    <button class="torles" onclick="deleteUser(${user.id})">Törlés</button>
                </span>
            </li>
        `;
                    });
                }

                // CREATE
                function createUser() {
                    const nev = document.getElementById("nev").value;
                    const varos = document.getElementById("varos").value;

                    if (!nev || !varos) return;

                    const newUser = {
                        id: Date.now(),
                        nev,
                        varos
                    };

                    users.push(newUser);
                    render();
                }

                // DELETE
                function deleteUser(id) {
                    users = users.filter(user => user.id !== id);
                    render();
                }

                // UPDATE
                function updateUser(id) {
                    const ujNev = prompt("Új név:");
                    const ujVaros = prompt("Új város:");

                    users = users.map(user => {
                        if (user.id === id) {
                            return { ...user, nev: ujNev, varos: ujVaros };
                        }
                        return user;
                    });

                    render();
                }

                // induláskor
                render();
            </script>

        </div>
    </div>

        Mata László Dominik (b223va) & Balogh Milán (eecvn6)
    </footer>
</body>

</html>
